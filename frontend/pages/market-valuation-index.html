<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Market Valuation Index</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/pages/market-valuation-index.css">
  <link rel="stylesheet" href="../css/theme-toggle.css">
  <script>
    (function(){
      var t=localStorage.getItem('iv-theme')||'';
      if(t)document.documentElement.setAttribute('data-theme',t);
    })();
  </script>
</head>
<body>
  <main class="iv-page-shell iv-market-valuation-index-page">
    <div class="iv-view" id="view-valuation">
          <div class="iv-section-title">
            <div class="iv-kicker">Market Valuation Index</div>
            <h2>Intrinsic value zone indicator.</h2>
            <p>Placeholder for overall market undervaluation, fair valuation and overvaluation scoring.</p>
          </div>
          <div class="iv-grid two">
            <div class="iv-card">
              <h3>Current Market Zone</h3>
              <div class="iv-metric"><strong>—</strong><span class="iv-pill">Pending data</span></div>
              <p>Final model can classify the market into undervalued, fair, overvalued and very overvalued zones.</p>
            </div>
            <div class="iv-card">
              <h3>Zone Distribution</h3>
              <div class="iv-chart-placeholder"><span class="iv-bar" style="height: 62%"></span><span class="iv-bar"
                  style="height: 72%"></span><span class="iv-bar" style="height: 38%"></span><span class="iv-bar"
                  style="height: 26%"></span></div>
            </div>
          </div>
  </main>
  <script src="../js/navigation.js?v=2"></script>
  <script src="../js/modules/market-valuation-index.js"></script>
    <button class="iv-theme-toggle" id="ivThemeToggle" title="Switch theme" aria-label="Toggle theme">
    <span class="iv-theme-icon">☀️</span>
  </button>
  <script>
    (function(){
      var b=document.getElementById('ivThemeToggle');
      var i=b.querySelector('.iv-theme-icon');
      function u(){
        var t=document.documentElement.getAttribute('data-theme')||'';
        if(t==='dark')i.textContent='🌙';
        else i.textContent='☀️';
      }
      u();
      b.onclick=function(){
        var t=document.documentElement.getAttribute('data-theme')||'';
        var n=t==='dark'?'':'dark';
        if(n)document.documentElement.setAttribute('data-theme',n);
        else document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('iv-theme',n);u();
      };
    })();
  </script>
</body>
</html>
