<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Headwind / Tailwind Indicator</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/pages/headwind.css">
  <link rel="stylesheet" href="../css/theme-toggle.css">
  <script>
    (function(){
      var t=localStorage.getItem('iv-theme')||'';
      if(t)document.documentElement.setAttribute('data-theme',t);
    })();
  </script>
</head>
<body>
  <main class="iv-page-shell iv-headwind-page">
    <div class="iv-section-title">
            <div class="iv-kicker">Headwind / Tailwind Indicator</div>
            <h2>Market &amp; Sector Promoter Signal</h2>
          </div>

          <div class="iv-card">
            <div class="iv-hw-table-wrap">
              <table class="iv-hw-sector-table">
                <thead>
                  <tr>
                    <th style="min-width:160px">Market</th>
                    <th class="right" style="min-width:130px">Score</th>
                    <th class="center" style="min-width:110px">Signal</th>
                  </tr>
                </thead>
                <tbody id="ivHeadwindTableBody">
                  <tr>
                    <td colspan="3" style="color:#AAB6CC;text-align:center;padding:24px">Loading data…</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
  </main>
  <script src="../js/navigation.js?v=2"></script>
  <script src="../js/modules/headwind.js"></script>
    <button class="iv-theme-toggle" id="ivThemeToggle" title="Switch theme" aria-label="Toggle theme">
    <span class="iv-theme-icon">☀️</span>
  </button>
  <script>
    (function(){
      var b=document.getElementById('ivThemeToggle');
      var i=b.querySelector('.iv-theme-icon');
      function u(){
        var t=document.documentElement.getAttribute('data-theme')||'';
        if(t==='dark')i.textContent='🌙';
        else i.textContent='☀️';
      }
      u();
      b.onclick=function(){
        var t=document.documentElement.getAttribute('data-theme')||'';
        var n=t==='dark'?'':'dark';
        if(n)document.documentElement.setAttribute('data-theme',n);
        else document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('iv-theme',n);u();
      };
    })();
  </script>
</body>
</html>
