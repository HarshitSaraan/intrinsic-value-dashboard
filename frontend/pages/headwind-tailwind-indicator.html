<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="../assets/onlylogo.PNG">
  <title>Upcycle / Down cycle Indicator</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/pages/headwind.css">
  <link rel="stylesheet" href="../css/theme-toggle.css">
  <script>
    (function(){
      var t=localStorage.getItem('iv-theme');
      if(t===null)t='dark';
      if(t)document.documentElement.setAttribute('data-theme',t);
    })();
  </script>
</head>
<body>
  <main class="iv-page-shell iv-headwind-page">
    <div class="iv-section-title">
            <div class="iv-kicker">Upcycle / Down cycle Indicator</div>
            <h2>Market &amp; Sector Upcycle &amp; Downcycle indicator.</h2>
          </div>

          <div class="iv-card">
            <div class="iv-hw-table-wrap">
              <table class="iv-hw-sector-table">
                <thead>
                  <tr>
                    <th class="iv-hw-col-market">Market</th>
                    <th class="right iv-hw-col-score">Score</th>
                    <th class="center iv-hw-col-signal">Signal</th>
                  </tr>
                </thead>
                <tbody id="ivHeadwindTableBody">
                  <tr>
                    <td colspan="3" style="color:#AAB6CC;text-align:center;padding:24px">Loading data…</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
    <div class="iv-bharat-footer"><span class="made-green">MADE</span> <span class="made-in">IN</span> <span class="made-bharat">BHARAT</span></div>
  </main>
  <script src="../js/navigation.js?v=2"></script>
  <script src="../js/modules/headwind.js"></script>
</body>
</html>
