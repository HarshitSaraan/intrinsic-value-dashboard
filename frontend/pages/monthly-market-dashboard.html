<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Monthly Market Dashboard</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/pages/monthly-market-dashboard.css">
</head>
<body>
  <main class="iv-page-shell iv-monthly-market-dashboard-page">
    <div class="iv-view" id="view-monthly">
          <div class="iv-section-title">
            <div class="iv-kicker">Monthly Market Dashboard</div>
            <h2>Market breadth, valuation zones and sector heatmap.</h2>
            <p>Placeholder for monthly market report visuals and key dashboard cards.</p>
          </div>
          <div class="iv-grid three">
            <div class="iv-card">
              <h3>Undervalued</h3>
              <div class="iv-metric"><strong>—%</strong><span class="iv-pill">Zone</span></div>
            </div>
            <div class="iv-card">
              <h3>Fair Value</h3>
              <div class="iv-metric"><strong>—%</strong><span class="iv-pill">Zone</span></div>
            </div>
            <div class="iv-card">
              <h3>Overvalued</h3>
              <div class="iv-metric"><strong>—%</strong><span class="iv-pill">Zone</span></div>
            </div>
          </div>
          <div class="iv-card">
            <h3>Market Valuation Distribution</h3>
            <div class="iv-chart-placeholder"><span class="iv-bar" style="height: 52%"></span><span class="iv-bar"
                style="height: 76%"></span><span class="iv-bar" style="height: 44%"></span><span class="iv-bar"
                style="height: 30%"></span></div>
          </div>
  </main>
  <script src="../js/navigation.js?v=2"></script>
  <script src="../js/modules/monthly-market-dashboard.js"></script>
</body>
</html>
